name: TestFlight

# Builds the iOS app and ships it to TestFlight whenever the
# `Release` workflow finishes successfully. Triggering off the
# release run (not off push/tag directly) means we only burn a
# build slot when the cross-platform release pipeline is green —
# if the macOS/Linux/Windows binaries failed, TestFlight stays
# untouched.
#
# Manual override: `workflow_dispatch` (Run workflow button) lets
# you ship from any ref without waiting for the release.
#
# ------------------------------------------------------------------
# Secrets the workflow expects (set under repo → Settings →
# Environments → `release` → Environment secrets):
#
#   BUILD_CERTIFICATE_BASE64         base64 of Apple Distribution .p12
#   P12_PASSWORD                     password used to export the .p12
#   MAC_KEYCHAIN_PASSWORD            ad-hoc password for the CI keychain
#   PROVISIONING_PROFILE_BASE64      base64 of the App Store
#                                    .mobileprovision matching
#                                    `app.outl.mobile-app`
#   APP_STORE_CONNECT_KEY_ID         e.g. `ABCD1234EF`
#   APP_STORE_CONNECT_ISSUER_ID      e.g. `69a6de7c-...`
#   APP_STORE_CONNECT_API_KEY_BASE64 base64 of the `.p8` AuthKey
#
# Generate them once:
#   base64 -i Apple_Distribution.p12 | pbcopy
#   base64 -i outl_AppStore.mobileprovision | pbcopy
#   base64 -i AuthKey_ABCD1234EF.p8 | pbcopy
# ------------------------------------------------------------------

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Serialize uploads per source release. We don't cancel: a half-
  # uploaded IPA is fine, but two concurrent altool uploads with the
  # same CFBundleVersion is not.
  group: testflight-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  testflight:
    name: Build & upload to TestFlight
    runs-on: macos-latest
    # Only run when the upstream Release succeeded, or when a human
    # explicitly clicked "Run workflow". `workflow_run` fires on
    # every conclusion (success/failure/cancelled), so the guard is
    # mandatory.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    # The `release` environment holds the Apple signing material and
    # App Store Connect API key. Binding the job to it means:
    #   1. Secrets resolve from environment scope (not repo scope).
    #   2. Any protection rules configured on the environment
    #      (required reviewer, deployment branch policy, wait timer)
    #      apply to every TestFlight run — including the auto ones
    #      fired by `workflow_run`.
    # Configure under: repo → Settings → Environments → release.
    environment:
      name: release
      url: https://appstoreconnect.apple.com/apps

    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      KEYCHAIN_PWD: ${{ secrets.MAC_KEYCHAIN_PASSWORD }}

    steps:
      - name: Checkout (commit that triggered the release)
        uses: actions/checkout@v4
        with:
          # For workflow_run, `github.sha` points at the default
          # branch tip — not at what Release actually built. We
          # want the exact SHA the upstream pipeline signed off on.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Compute build metadata
        id: meta
        shell: bash
        run: |
          # Short version: marketing string (must be x[.y[.z]] per
          # Apple). Reuse the workspace version verbatim — Apple
          # rejects pre-release suffixes here, so we strip
          # `-beta.N` etc.
          BASE=$(awk -F'"' '/^version = /{print $2; exit}' Cargo.toml)
          SHORT_VERSION="${BASE%%-*}"

          # CFBundleVersion: monotonically increasing integer.
          # Use the Release workflow's run_number when we were
          # triggered by it (so multiple TestFlight retries of the
          # same release share a build number), otherwise our own
          # run_number for workflow_dispatch.
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            BUILD_NUMBER="${{ github.event.workflow_run.run_number }}"
          else
            BUILD_NUMBER="${{ github.run_number }}"
          fi

          echo "short_version=${SHORT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "::notice::TestFlight ${SHORT_VERSION} (build ${BUILD_NUMBER})"

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          rustup show

      - name: Install Rust iOS device target
        run: rustup target add aarch64-apple-ios

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-testflight-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-testflight-
            ${{ runner.os }}-cargo-ios-
            ${{ runner.os }}-cargo-

      - name: Install tauri-cli
        run: |
          if ! command -v cargo-tauri >/dev/null; then
            cargo install tauri-cli --version "^2.0" --locked
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: bun install
        working-directory: crates/outl-mobile
        run: bun install --frozen-lockfile

      # --------------------------------------------------------------
      # Signing material setup. Everything goes in $RUNNER_TEMP or
      # the user library so the `cleanup` step (always: true) can
      # nuke it whether the build succeeds or not — no signing key
      # outlives the job.
      # --------------------------------------------------------------
      - name: Import Apple Distribution certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          # codesign needs partition-list ACLs configured or it
          # prompts for the keychain password interactively — fatal
          # in CI.
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PWD" \
            "$KEYCHAIN_PATH" >/dev/null
          # Make the new keychain searchable alongside whatever is
          # already in the user search list.
          security list-keychain -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychain -d user | sed -e 's/^ *//' -e 's/"//g')

          rm -f "$CERT_PATH"

      - name: Install provisioning profile
        id: profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          PROFILE_PATH="$PROFILE_DIR/outl-appstore.mobileprovision"
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"

          # Extract the profile's name + UUID so we can wire them
          # into the pbxproj for Manual signing. `security cms -D`
          # unwraps the CMS-signed plist; plutil reads the fields.
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$PROFILE_PLIST")
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$PROFILE_PLIST")
          rm -f "$PROFILE_PLIST"

          echo "name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"
          echo "uuid=$PROFILE_UUID" >> "$GITHUB_OUTPUT"
          echo "::notice::Provisioning profile '$PROFILE_NAME' ($PROFILE_UUID) installed"

      - name: Install App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode \
            -o "$KEY_DIR/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

      # --------------------------------------------------------------
      # Version patching. Apple wants both keys present on the
      # uploaded IPA; agvtool/xcodebuild override semantics differ
      # by Xcode version, so plutil on the Info.plist is the only
      # reliable knob.
      # --------------------------------------------------------------
      - name: Patch Info.plist (CFBundleVersion + CFBundleShortVersionString)
        shell: bash
        run: |
          PLIST="crates/outl-mobile/src-tauri/gen/apple/outl-mobile_iOS/Info.plist"
          plutil -replace CFBundleShortVersionString \
            -string "${{ steps.meta.outputs.short_version }}" "$PLIST"
          plutil -replace CFBundleVersion \
            -string "${{ steps.meta.outputs.build_number }}" "$PLIST"
          echo "::group::Patched Info.plist"
          plutil -p "$PLIST" | grep -E 'CFBundle(Version|ShortVersionString|Identifier)'
          echo "::endgroup::"

      # --------------------------------------------------------------
      # Patch the xcodeproj for Manual signing in CI.
      #
      # The committed pbxproj uses `CODE_SIGN_IDENTITY = "iPhone
      # Developer"` with implicit Automatic signing — that works on
      # a developer's Mac (Xcode reads the logged-in Apple ID), but
      # CI runners have no Apple ID. We override in-place on the
      # runner only (the modified file is never committed):
      #
      #   CODE_SIGN_STYLE = Manual
      #   CODE_SIGN_IDENTITY = "Apple Distribution"
      #   PROVISIONING_PROFILE_SPECIFIER = "<profile name>"
      #   PROVISIONING_PROFILE = "<profile uuid>"
      #
      # `iPhone Developer` is also why the previous run failed with
      # "No profiles for ... iOS App Development were found": with
      # that identity, xcodebuild looks for a Development profile
      # even when archiving for the App Store. Flipping to
      # "Apple Distribution" makes it look up the App Store profile.
      # --------------------------------------------------------------
      - name: Patch xcodeproj for Manual signing
        env:
          PROFILE_NAME: ${{ steps.profile.outputs.name }}
          PROFILE_UUID: ${{ steps.profile.outputs.uuid }}
        run: |
          PBX="crates/outl-mobile/src-tauri/gen/apple/outl-mobile.xcodeproj/project.pbxproj"
          # Replace every `CODE_SIGN_IDENTITY = "iPhone Developer";`
          # with the Distribution identity + style + profile pair.
          # Touching both debug and release configs is fine — CI
          # only ever archives Release.
          REPLACEMENT="CODE_SIGN_IDENTITY = \"Apple Distribution\"; CODE_SIGN_STYLE = Manual; PROVISIONING_PROFILE_SPECIFIER = \"${PROFILE_NAME}\"; PROVISIONING_PROFILE = \"${PROFILE_UUID}\";"
          python3 - "$PBX" "$REPLACEMENT" <<'PY'
          import sys, pathlib
          path = pathlib.Path(sys.argv[1])
          replacement = sys.argv[2]
          text = path.read_text()
          needle = 'CODE_SIGN_IDENTITY = "iPhone Developer";'
          if needle not in text:
              print(f"::error::needle not found in {path}", file=sys.stderr)
              sys.exit(1)
          patched = text.replace(needle, replacement)
          path.write_text(patched)
          print(f"::notice::Patched {text.count(needle)} signing block(s) in pbxproj")
          PY
          echo "::group::Signing settings after patch"
          grep -nE "CODE_SIGN_(STYLE|IDENTITY)|PROVISIONING_PROFILE" "$PBX" | head -20
          echo "::endgroup::"

      # --------------------------------------------------------------
      # Drop the static `libapp.a` from the Resources build phase.
      #
      # `cargo tauri ios init` adds the Rust output (`libapp.a`) to
      # BOTH the Frameworks phase (correct — it must be linked) AND
      # the Resources phase (wrong — Resources copies files into the
      # bundle, and the file ref is hardcoded to
      # `Externals/arm64/debug/libapp.a`, not `${CONFIGURATION}`).
      #
      # In a Debug build the path happens to line up. A Release/
      # archive build writes to `arm64/release/libapp.a`, so the
      # Resources copy step fails with `lstat ... debug/libapp.a:
      # No such file or directory` — exactly the failure we hit on
      # the previous TestFlight attempt.
      #
      # Removing the Resources entry is safe: the lib still links
      # via the Frameworks phase, and a `.a` has no business being
      # copied as a runtime resource anyway.
      # --------------------------------------------------------------
      - name: Patch xcodeproj — strip libapp.a from Resources
        run: |
          PBX="crates/outl-mobile/src-tauri/gen/apple/outl-mobile.xcodeproj/project.pbxproj"
          python3 - "$PBX" <<'PY'
          import re, sys, pathlib
          path = pathlib.Path(sys.argv[1])
          text = path.read_text()
          m = re.search(
              r'(\w+) /\* libapp\.a in Resources \*/ = '
              r'\{isa = PBXBuildFile; fileRef = \w+ /\* libapp\.a \*/; \};',
              text,
          )
          if not m:
              print("::warning::libapp.a Resources entry not found; nothing to strip")
              sys.exit(0)
          bid = m.group(1)
          # Remove the PBXBuildFile declaration line.
          pat_def = re.compile(
              rf'\s*{bid} /\* libapp\.a in Resources \*/ = '
              rf'\{{isa = PBXBuildFile; fileRef = \w+ /\* libapp\.a \*/; \}};\n'
          )
          text, n1 = pat_def.subn('', text)
          # Remove the entry from the Resources phase `files = (...)` list.
          pat_ref = re.compile(rf'\s*{bid} /\* libapp\.a in Resources \*/,\n')
          text, n2 = pat_ref.subn('', text)
          path.write_text(text)
          print(f"::notice::Stripped libapp.a from Resources (def={n1}, ref={n2})")
          PY
          echo "::group::libapp.a phase membership after strip"
          grep -nE "libapp\.a in (Resources|Frameworks)" "$PBX" || true
          echo "::endgroup::"

      # --------------------------------------------------------------
      # Build. `cargo tauri ios build` runs xcodegen, compiles the
      # Rust libs for aarch64-apple-ios, archives via xcodebuild and
      # writes the signed IPA to `gen/apple/build/outl.ipa`.
      # `--export-method app-store-connect` flips ExportOptions.plist
      # to App Store distribution (default is `debugging` — see the
      # ExportOptions.plist currently checked in).
      # --------------------------------------------------------------
      - name: cargo tauri ios build (release, app-store)
        working-directory: crates/outl-mobile
        env:
          CI: "true"
        run: |
          cargo tauri ios build \
            --export-method app-store-connect

      - name: Locate built IPA
        id: ipa
        shell: bash
        run: |
          IPA="crates/outl-mobile/src-tauri/gen/apple/build/outl.ipa"
          if [[ ! -f "$IPA" ]]; then
            echo "::error::Expected IPA at $IPA not found"
            echo "Searching for any .ipa under gen/apple/build:"
            find crates/outl-mobile/src-tauri/gen/apple/build -maxdepth 4 -name '*.ipa' || true
            exit 1
          fi
          echo "path=$IPA" >> "$GITHUB_OUTPUT"
          ls -lh "$IPA"

      # --------------------------------------------------------------
      # Upload. altool's `--upload-app` is the documented path for
      # TestFlight ingestion via the App Store Connect API key (the
      # newer `notarytool` is macOS-only, not iOS). Apple still ships
      # it inside Xcode in 2026, but if it ever goes away the
      # fallback is `xcrun iTMSTransporter -m upload`.
      # --------------------------------------------------------------
      - name: Upload IPA to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "${{ steps.ipa.outputs.path }}" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload IPA as workflow artifact (backup)
        if: always() && steps.ipa.outputs.path != ''
        uses: actions/upload-artifact@v4
        with:
          name: outl-ios-${{ steps.meta.outputs.short_version }}-${{ steps.meta.outputs.build_number }}
          path: ${{ steps.ipa.outputs.path }}
          if-no-files-found: warn
          retention-days: 30

      # --------------------------------------------------------------
      # Cleanup runs no matter what. The runner is ephemeral, but
      # defensive deletion avoids leaking secrets via cache or
      # artifact misconfiguration.
      # --------------------------------------------------------------
      - name: Cleanup signing material
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/outl-appstore.mobileprovision"
          if [[ -n "$APP_STORE_CONNECT_KEY_ID" ]]; then
            rm -f "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          fi
