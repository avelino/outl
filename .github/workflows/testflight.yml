name: TestFlight

# Uploads the signed iOS build to TestFlight. The heavy lifting
# (Rust + Tauri archive + xcodebuild export) lives in
# `mobile.yml`'s `ios-release` job, which publishes the signed
# `.ipa` as the `outl-ios-release` artifact. This workflow only
# downloads that artifact and runs `xcrun altool --upload-app`,
# so a TestFlight ship takes ~3 min instead of ~20.
#
# Triggers:
#   - `workflow_run` on the `Mobile` workflow completing successfully.
#     Mobile already filters by path, so a docs-only push to main
#     never touches TestFlight.
#   - `workflow_dispatch` lets a human ship from any past `Mobile`
#     run by passing its `mobile_run_id` (defaults to the latest
#     successful run for the current ref).
#
# ------------------------------------------------------------------
# Secrets the workflow expects (Settings → Environments → `release`):
#
#   APP_STORE_CONNECT_KEY_ID         e.g. `ABCD1234EF`
#   APP_STORE_CONNECT_ISSUER_ID      e.g. `69a6de7c-...`
#   APP_STORE_CONNECT_API_KEY_BASE64 base64 of the `.p8` AuthKey
#
# Signing material (cert + provisioning profile) is consumed in
# `mobile.yml`'s `ios-release` job; it never lands here.
# ------------------------------------------------------------------

on:
  workflow_run:
    workflows: ["Mobile"]
    types: [completed]
  workflow_dispatch:
    inputs:
      mobile_run_id:
        description: "Mobile workflow run ID with the IPA artifact (empty = latest successful)"
        required: false
        type: string

permissions:
  contents: read
  actions: read   # download-artifact reaches into another workflow run

concurrency:
  # Serialize uploads per source commit. We don't cancel: a half-
  # uploaded IPA is fine, but two concurrent altool uploads with the
  # same CFBundleVersion is not.
  group: testflight-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  upload:
    name: Upload IPA to TestFlight
    runs-on: macos-latest
    # workflow_run fires on every conclusion; only proceed when:
    #   1. a human triggered us manually (workflow_dispatch), or
    #   2. the Mobile workflow finished `success` AND was triggered
    #      by an event that actually runs the `ios-release` job —
    #      `push` or `workflow_dispatch`. On `pull_request` the
    #      Mobile workflow's `ios-release` step is skipped (PRs
    #      never sign IPAs), the workflow still reports `success`,
    #      and we'd come down here to download an artifact that was
    #      never uploaded. Mirror the `ios-release` gate from
    #      `mobile.yml` so we only fire when there's actually a
    #      signed IPA waiting for us.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.event == 'push' ||
        github.event.workflow_run.event == 'workflow_dispatch'))

    environment:
      name: release
      url: https://appstoreconnect.apple.com/apps

    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

    steps:
      - name: Resolve Mobile run ID
        id: src
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH_RUN_ID: ${{ github.event.inputs.mobile_run_id }}
        run: |
          # Three sources of truth, in priority order:
          #   1. `workflow_dispatch` input (manual override).
          #   2. `workflow_run.id` (the Mobile run that triggered us).
          #   3. latest successful Mobile run on the default branch
          #      (only used when neither of the above is set — keeps
          #      `gh workflow run testflight.yml` from any ref usable).
          if [[ -n "${DISPATCH_RUN_ID:-}" ]]; then
            RUN_ID="$DISPATCH_RUN_ID"
            echo "::notice::Using mobile_run_id from dispatch input: $RUN_ID"
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            RUN_ID="${{ github.event.workflow_run.id }}"
            echo "::notice::Using triggering Mobile run: $RUN_ID"
          else
            RUN_ID=$(gh run list \
              --workflow=Mobile \
              --branch=main \
              --status=success \
              --limit=1 \
              --json databaseId \
              --jq '.[0].databaseId')
            if [[ -z "$RUN_ID" || "$RUN_ID" == "null" ]]; then
              echo "::error::no successful Mobile run on main to ship from"
              exit 1
            fi
            echo "::notice::Falling back to latest successful Mobile run on main: $RUN_ID"
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download IPA artifact from Mobile run
        uses: actions/download-artifact@v4
        with:
          name: outl-ios-release
          path: ipa-bundle
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.src.outputs.run_id }}

      - name: Read build metadata
        id: meta
        shell: bash
        run: |
          META="ipa-bundle/metadata.env"
          if [[ ! -f "$META" ]]; then
            echo "::error::metadata.env not found in artifact"
            ls -la ipa-bundle/
            exit 1
          fi
          # shellcheck disable=SC1090
          . "$META"
          echo "short_version=${short_version}" >> "$GITHUB_OUTPUT"
          echo "build_number=${build_number}" >> "$GITHUB_OUTPUT"
          echo "::notice::TestFlight ${short_version} (build ${build_number}) from sha ${head_sha:0:7}"

      - name: Locate IPA
        id: ipa
        shell: bash
        run: |
          IPA="ipa-bundle/outl.ipa"
          if [[ ! -f "$IPA" ]]; then
            FOUND=$(find ipa-bundle -maxdepth 2 -name '*.ipa' | head -1)
            if [[ -n "$FOUND" ]]; then
              IPA="$FOUND"
            else
              echo "::error::no .ipa in artifact"
              find ipa-bundle -maxdepth 3 -type f
              exit 1
            fi
          fi
          echo "path=$IPA" >> "$GITHUB_OUTPUT"
          ls -lh "$IPA"

      # `altool --upload-app` is the documented App Store Connect
      # ingestion path. It ships inside Xcode so we need an Xcode
      # install on the runner (any version works for upload; this
      # step doesn't compile anything).
      - name: Select Xcode (for altool)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode \
            -o "$KEY_DIR/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

      - name: Upload IPA to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "${{ steps.ipa.outputs.path }}" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Re-upload IPA as workflow artifact (audit trail)
        if: always() && steps.ipa.outputs.path != ''
        uses: actions/upload-artifact@v4
        with:
          name: outl-ios-testflight-${{ steps.meta.outputs.short_version }}-${{ steps.meta.outputs.build_number }}
          path: ${{ steps.ipa.outputs.path }}
          if-no-files-found: warn
          retention-days: 30

      - name: Cleanup API key
        if: always()
        run: |
          if [[ -n "$APP_STORE_CONNECT_KEY_ID" ]]; then
            rm -f "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          fi
