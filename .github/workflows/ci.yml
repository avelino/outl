name: CI

# Trigger filter: `paths-ignore` skips CI when every changed file is
# in the list. Docs-only PRs, asset bumps, and edits to sibling
# workflow files don't need fmt + clippy + test + doc to run.
# `Cargo.toml` / `Cargo.lock` stay out of the ignore list on purpose
# so dependency changes always trigger the full check.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'assets/**'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitignore'
      - '.github/workflows/mobile.yml'
      - '.github/workflows/bench.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/testflight.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'assets/**'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitignore'
      - '.github/workflows/mobile.yml'
      - '.github/workflows/bench.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/testflight.yml'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain (rustfmt)
        run: rustup show
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain (clippy)
        run: rustup show
      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-
            ${{ runner.os }}-cargo-
      - name: cargo clippy
        # outl-mobile and outl-desktop pull Tauri deps (glib-sys,
        # gobject-sys, webkit2gtk) that need system GTK libs we
        # don't install here. Mobile is covered by `mobile.yml` on
        # macOS; desktop has its own `desktop.yml` matrix (Linux runs
        # with GTK installed there).
        run: cargo clippy --workspace --exclude outl-mobile --exclude outl-desktop --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: rustup show
      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-
      - name: cargo test
        # outl-mobile and outl-desktop depend on Tauri's
        # macOS/iOS-specific surface and on system GTK libs we don't
        # install on Linux. Mobile is covered by `mobile.yml` on
        # macOS; desktop has its own `desktop.yml` matrix.
        run: cargo test --workspace --exclude outl-mobile --exclude outl-desktop --all-targets

  docs:
    name: cargo doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: rustup show
      - name: cargo doc
        env:
          RUSTDOCFLAGS: "-D warnings"
        # See clippy / test jobs above: outl-mobile and outl-desktop
        # need system GTK libs we don't install on Linux. Mobile docs
        # build via `mobile.yml` on macOS; desktop docs build via the
        # `desktop.yml` matrix.
        run: cargo doc --workspace --exclude outl-mobile --exclude outl-desktop --no-deps
