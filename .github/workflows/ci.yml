name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain (rustfmt)
        run: rustup show
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain (clippy)
        run: rustup show
      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-
            ${{ runner.os }}-cargo-
      - name: cargo clippy
        # outl-mobile pulls Tauri deps (glib-sys, gobject-sys, webkit2gtk)
        # that need system GTK libs we don't install here. The mobile
        # crate is covered by .github/workflows/mobile.yml on macOS.
        run: cargo clippy --workspace --exclude outl-mobile --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: rustup show
      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-
      - name: cargo test
        # outl-mobile depends on Tauri's macOS/iOS-specific surface
        # and on system GTK libs that we don't install on Linux. The
        # mobile crate is covered by .github/workflows/mobile.yml on
        # macOS together with outl-actions/core/md.
        run: cargo test --workspace --exclude outl-mobile --all-targets

  docs:
    name: cargo doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: rustup show
      - name: cargo doc
        env:
          RUSTDOCFLAGS: "-D warnings"
        # See clippy / test jobs above: outl-mobile needs system GTK
        # libs we don't install on Linux. Mobile docs build on macOS
        # via mobile.yml.
        run: cargo doc --workspace --exclude outl-mobile --no-deps
