name: CI

# Trigger filter: `paths-ignore` skips CI when every changed file is
# in the list. Docs-only PRs, asset bumps, and edits to sibling
# workflow files don't need fmt + clippy + test + doc to run.
# `Cargo.toml` / `Cargo.lock` stay out of the ignore list on purpose
# so dependency changes always trigger the full check.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'assets/**'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitignore'
      - '.github/workflows/mobile.yml'
      - '.github/workflows/bench.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/testflight.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'assets/**'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitignore'
      - '.github/workflows/mobile.yml'
      - '.github/workflows/bench.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/testflight.yml'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# Cancel the previous CI run when a newer commit lands on the same
# ref. Status reported on `main` (and on a PR) is the one that matters
# for the latest tip; the older fmt/clippy/test run for the parent
# commit just burns runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain (rustfmt)
        run: rustup show
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain (clippy)
        run: rustup show
      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-
            ${{ runner.os }}-cargo-
      - name: cargo clippy
        # outl-mobile, outl-desktop and outl-tauri-shared pull Tauri
        # deps (glib-sys, gobject-sys, webkit2gtk) that need system
        # GTK libs we don't install here. Mobile is covered by
        # `mobile.yml` on macOS; desktop + the shared crate build via
        # the `desktop.yml` matrix (Linux runs with GTK installed
        # there).
        run: cargo clippy --workspace --exclude outl-mobile --exclude outl-desktop --exclude outl-tauri-shared --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: rustup show
      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-
      - name: cargo test
        # outl-mobile, outl-desktop and outl-tauri-shared depend on
        # Tauri's macOS/iOS-specific surface and on system GTK libs we
        # don't install on Linux. Mobile is covered by `mobile.yml` on
        # macOS; desktop + the shared crate via the `desktop.yml`
        # matrix.
        run: cargo test --workspace --exclude outl-mobile --exclude outl-desktop --exclude outl-tauri-shared --all-targets

  docs:
    name: cargo doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: rustup show
      - name: cargo doc
        env:
          RUSTDOCFLAGS: "-D warnings"
        # See clippy / test jobs above: outl-mobile, outl-desktop and
        # outl-tauri-shared need system GTK libs we don't install on
        # Linux. Mobile docs build via `mobile.yml` on macOS; desktop +
        # shared-crate docs via the `desktop.yml` matrix.
        run: cargo doc --workspace --exclude outl-mobile --exclude outl-desktop --exclude outl-tauri-shared --no-deps

  # Dedicated sync-convergence gate. The `test` job above already
  # compiles and runs `outl-core` + `outl-sync-iroh` (including their
  # `tests/` integration + property suites via `--all-targets`), but it
  # runs proptests at the dev default (200 cases) and buries a sync
  # regression inside a broad matrix job. This job exists so a sync
  # regression surfaces as its own obviously-red check, and so the
  # convergence/chaos proptests actually *explore* in CI.
  #
  # `PROPTEST_CASES` is proptest's built-in override of each suite's
  # `ProptestConfig::with_cases(...)`. Dev runs stay fast at the 200
  # baked into the test files; CI bumps it to 1024 here so the
  # probabilistic convergence bugs (op reordering, cycle no-ops,
  # concurrent moves) get a real number of generated cases. Keep this
  # budget on this one job only — running 1024 across the whole
  # `test` matrix would burn runner minutes for no extra signal.
  #
  # Branch protection: mark **`sync`** as a required status check in
  # the repo settings so a red convergence run blocks merge. (Required
  # checks are a GitHub repo setting, not something this file can
  # declare.)
  sync:
    name: sync
    runs-on: ubuntu-latest
    env:
      # Higher than the dev default baked into the proptest files so CI
      # explores the convergence/chaos space. Bump further (2048+) when
      # chasing a rare flake; lower only with a recorded reason.
      PROPTEST_CASES: 1024
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: rustup show
      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-sync-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-sync-
            ${{ runner.os }}-cargo-
      - name: cargo test (sync convergence)
        # `--all-targets` pulls in the `tests/` integration + property
        # suites for both crates, not just the unit tests. These two
        # crates own the op-log → CRDT → convergence path that every
        # device relies on.
        run: cargo test -p outl-core -p outl-sync-iroh --all-targets
