name: Desktop

# Builds the `outl-desktop` Tauri 2 application for macOS, Linux and
# Windows. PRs touching the desktop crate or any of its workspace
# dependencies run the build matrix to catch regressions early. The
# release path (signed artefacts, Homebrew cask) lives in
# `release.yml` and tags the resulting binaries off of a tag push —
# this workflow is the "does it still compile and bundle on every OS?"
# guard.

on:
  push:
    branches: [main]
    paths:
      - "crates/outl-desktop/**"
      - "crates/outl-frontend-shared/**"
      - "crates/outl-actions/**"
      - "crates/outl-core/**"
      - "crates/outl-md/**"
      - "crates/outl-exec/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/desktop.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/outl-desktop/**"
      - "crates/outl-frontend-shared/**"
      - "crates/outl-actions/**"
      - "crates/outl-core/**"
      - "crates/outl-md/**"
      - "crates/outl-exec/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/desktop.yml"
  workflow_dispatch:

# Cancel an in-flight run when a new push lands on the same branch —
# the bundle for the older commit is no longer interesting.
concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS arm64
            rust_target: aarch64-apple-darwin
          - os: macos-13
            label: macOS x86_64
            rust_target: x86_64-apple-darwin
          - os: ubuntu-22.04
            label: Linux x86_64
            rust_target: x86_64-unknown-linux-gnu
          - os: windows-2022
            label: Windows x86_64
            rust_target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Linux needs the Tauri 2 build deps (webkit2gtk-4.1, libsoup-3,
      # libappindicator). macOS / Windows have everything in the
      # default GitHub runner.
      - name: Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: desktop-${{ matrix.label }}

      - name: Install frontend dependencies
        run: bun install

      - name: Build (cargo)
        run: cargo build -p outl-desktop --release
        env:
          # Keep doc warnings green so PRs don't regress rustdoc on a
          # platform the maintainers don't run locally.
          RUSTDOCFLAGS: "-D warnings"

      - name: Clippy
        run: cargo clippy -p outl-desktop --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test -p outl-desktop

      - name: Frontend tests
        run: bun --filter outl-desktop test

      - name: Type-check frontend
        working-directory: crates/outl-desktop
        run: bunx tsc --noEmit

      - name: Tauri bundle
        working-directory: crates/outl-desktop
        run: bun run tauri build -- --no-bundle
        # `--no-bundle` keeps CI fast (skip dmg/msi/AppImage packagers
        # that we don't sign on PRs anyway). The release.yml workflow
        # drops the flag and signs.

      - name: Upload unsigned binary artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outl-desktop-${{ matrix.label }}
          path: |
            target/release/outl-desktop*
            target/release/bundle/
          if-no-files-found: ignore
          retention-days: 7
