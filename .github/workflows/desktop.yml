name: Desktop

# Builds the `outl-desktop` Tauri 2 application for macOS, Linux and
# Windows. PRs touching the desktop crate or any of its workspace
# dependencies run a check + build matrix to catch regressions
# early. The release path (signed artefacts, Homebrew cask) lives in
# `release.yml` and tags the resulting binaries off of a tag push —
# this workflow is the "does it still compile and bundle on every
# OS?" guard.
#
# Two jobs split by what's actually platform-specific:
#
#   `check`  → runs on Linux (cheapest runner). Owns clippy, rust
#              tests, Vitest, tsc, and the full build + tauri bundle
#              for Linux. Everything platform-agnostic happens here
#              once instead of four times.
#   `build`  → matrix of macOS arm64 / macOS x86_64 / Windows x86_64.
#              Compiles + bundles the Tauri app. We don't repeat
#              clippy/tests/vitest/tsc here because they don't care
#              which OS they're on.
#
# Neither job uploads artefacts. `release.yml` owns artefact
# distribution (signed dmg/msi for GA, beta builds on every main
# push), and the PR-stage runs are just compile guards.

on:
  push:
    branches: [main]
    paths:
      - "crates/outl-desktop/**"
      - "crates/outl-frontend-shared/**"
      - "crates/outl-actions/**"
      - "crates/outl-core/**"
      - "crates/outl-md/**"
      - "crates/outl-exec/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/desktop.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/outl-desktop/**"
      - "crates/outl-frontend-shared/**"
      - "crates/outl-actions/**"
      - "crates/outl-core/**"
      - "crates/outl-md/**"
      - "crates/outl-exec/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/desktop.yml"
  workflow_dispatch:

# Cancel an in-flight run when a new push lands on the same branch —
# the bundle for the older commit is no longer interesting.
concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    # `cargo test -p outl-desktop` links the desktop's test binaries with
    # tauri + webkit + wasmtime + iroh all in one image; since wasmtime 46
    # that link peaks past the runner's ~7 GB RAM and the OOM killer reaps
    # the job (clippy compiles fine — only `cargo test`/`build` link the fat
    # binaries, so it dies with no test output). `debuginfo=0` shrinks every
    # linked object, and dropping LTO + the single codegen-unit on the PR
    # release build cuts the linker's other peak; an unoptimised binary is
    # fine for a compile-only check (release.yml still ships the optimised,
    # stripped one). Revert when a future wasmtime slims the link or we move
    # to a larger runner.
    env:
      RUSTFLAGS: "-C debuginfo=0"
      CARGO_PROFILE_RELEASE_LTO: "false"
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Tauri 2 deps. Even the platform-agnostic checks (clippy,
      # `cargo test`) need outl-desktop to compile first, and that
      # depends on webkit2gtk-4.1 + libsoup-3 + libappindicator
      # being present.
      - name: Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: desktop-Linux x86_64

      - name: Install frontend dependencies
        run: bun install

      # ── Platform-agnostic checks: clippy, rust tests, Vitest, tsc
      # all produce identical results on macOS / Linux / Windows, so
      # we run them once here instead of four times in the matrix.

      - name: Clippy
        run: cargo clippy -p outl-desktop --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test -p outl-desktop

      - name: Frontend tests
        run: bun --filter outl-desktop test

      - name: Type-check frontend
        working-directory: crates/outl-desktop
        run: bunx tsc --noEmit

      # ── Platform-specific: build + bundle the Linux binary. Mirrors
      # what the `build` matrix below does for macOS + Windows.

      - name: Build (cargo)
        run: cargo build -p outl-desktop --release
        env:
          # Keep doc warnings green so PRs don't regress rustdoc on
          # a platform the maintainers don't run locally.
          RUSTDOCFLAGS: "-D warnings"

      - name: Tauri bundle
        working-directory: crates/outl-desktop
        # `--no-bundle` is a tauri-cli flag, not a cargo flag, so it
        # rides BEFORE any `--` separator. `--no-bundle` keeps CI
        # fast (skip dmg/msi/AppImage packagers we don't sign on PRs
        # anyway). `release.yml` is the workflow that produces the
        # actual dmg / msi artefacts for distribution.
        run: bun run tauri build --no-bundle

  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS arm64
            rust_target: aarch64-apple-darwin
          - os: windows-latest
            label: Windows x86_64
            rust_target: x86_64-pc-windows-msvc
          # macOS x86_64 is **not** in the PR matrix on purpose.
          # GitHub's `macos-13` (Intel) runner pool is consistently
          # depleted (jobs sit queued for hours, sometimes
          # overnight), so we don't block PRs on a target we can't
          # reliably schedule. `release.yml::build_desktop` still
          # produces a working macOS x86_64 binary via
          # `--target universal-apple-darwin`, which builds both
          # arches on a single `macos-latest` (arm64) runner and
          # lipo-merges them into one dmg.
          #
          # Both surfaces converged on `*-latest` instead of pinned
          # versions: `macos-13` is intentionally absent from CI and
          # `macos-14`/`windows-2022` were pinned needlessly. Using
          # `macos-latest` / `windows-latest` lets GitHub follow its
          # runner cadence without us re-pinning each cycle.

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: desktop-${{ matrix.label }}

      - name: Install frontend dependencies
        run: bun install

      - name: Build (cargo)
        run: cargo build -p outl-desktop --release
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Tauri bundle
        working-directory: crates/outl-desktop
        # See note on the `check` job. `--no-bundle` is a tauri flag,
        # not a cargo flag. The release.yml workflow drops the flag
        # and produces the actual dmg / msi artefacts for
        # distribution; this workflow is the PR-stage compile guard
        # only, so no artefact upload here.
        run: bun run tauri build --no-bundle
