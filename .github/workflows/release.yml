name: Release

# Every push to `main` produces a beta release automatically.
#
# - Tag:     `v<workspace.version>-beta.<run_number>` (e.g. `v0.1.0-beta.42`).
# - Binary:  reports the full beta version (workflow patches Cargo.toml
#            in-place with `sed` before `cargo build`; the change never
#            lands in the repo).
# - GitHub:  published as a prerelease with auto-generated release notes
#            (commits since the previous tag).
#
# When `workspace.package.version` bumps in `Cargo.toml` (e.g. `0.1.0` →
# `0.2.0`), the beta series resets automatically — the workflow just
# re-reads the base each run.
#
# Manual GA release: bump `workspace.package.version`, merge, then push a
# `v0.1.0` tag by hand. The `tags: ["v*"]` trigger below handles it.
#
# Publish layout: a single `create_release` job creates the release as a
# DRAFT before the build matrix runs. Each matrix job uploads its own
# assets via `gh release upload`. A final `publish_release` job flips
# the draft to published. This avoids two known failure modes:
#
#   1. `softprops/action-gh-release` in parallel jobs races to create
#      the release; the loser tries to UPDATE and fails because the
#      repo has Immutable Releases turned on
#      (`target_commitish cannot be changed when release is immutable`).
#   2. Once a release is published + immutable, assets cannot be added.
#      Draft releases accept uploads freely; we only publish after
#      every artifact landed.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Only one release job per ref. New push cancels the in-flight one.
  # Bump the suffix if a job gets stuck queued and GitHub can't cancel
  # it (happened with macos-13 in v1/v2 — runner pool was depleted).
  group: release-v3-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.compute.outputs.base }}
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}
      prerelease: ${{ steps.compute.outputs.prerelease }}
      create_tag: ${{ steps.compute.outputs.create_tag }}
    steps:
      - uses: actions/checkout@v4

      - id: compute
        shell: bash
        run: |
          BASE=$(awk -F'"' '/^version = /{print $2; exit}' Cargo.toml)

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Manual GA tag: trust the tag verbatim.
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
            CREATE_TAG="false"
          else
            # Auto beta from main push (or workflow_dispatch).
            VERSION="${BASE}-beta.${{ github.run_number }}"
            TAG="v${VERSION}"
            CREATE_TAG="true"
          fi

          # Anything containing -alpha / -beta / -rc is a prerelease.
          if [[ "${VERSION}" == *-alpha* || "${VERSION}" == *-beta* || "${VERSION}" == *-rc* ]]; then
            PRERELEASE="true"
          else
            PRERELEASE="false"
          fi

          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "create_tag=${CREATE_TAG}" >> "$GITHUB_OUTPUT"
          echo "::notice::Building ${TAG} (prerelease=${PRERELEASE})"

  tag:
    name: Create tag
    needs: prepare
    if: needs.prepare.outputs.create_tag == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Push tag
        run: |
          TAG='${{ needs.prepare.outputs.tag }}'
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "::notice::Tag ${TAG} already exists on origin; skipping create."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}"
          git push origin "${TAG}"

  create_release:
    name: Create draft release
    needs: [prepare, tag]
    # `tag` is skipped for tag-triggered runs; don't let that fail us.
    if: always() && needs.prepare.result == 'success' && (needs.tag.result == 'success' || needs.tag.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Create release as draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG='${{ needs.prepare.outputs.tag }}'
          VERSION='${{ needs.prepare.outputs.version }}'
          PRERELEASE_FLAG=()
          if [[ '${{ needs.prepare.outputs.prerelease }}' == 'true' ]]; then
            PRERELEASE_FLAG=( --prerelease )
          fi
          # Idempotent: a re-run after partial failure may find the
          # release already there. As long as it's still a draft we
          # can keep uploading; once published+immutable, give up.
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            IS_DRAFT=$(gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" --json isDraft --jq .isDraft)
            if [[ "${IS_DRAFT}" == "true" ]]; then
              echo "::notice::Release ${TAG} already exists as draft; reusing."
              exit 0
            fi
            echo "::error::Release ${TAG} already exists and is not a draft; refusing to clobber."
            exit 1
          fi
          gh release create "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft \
            "${PRERELEASE_FLAG[@]}" \
            --title "outl ${VERSION}" \
            --generate-notes \
            --target "${{ github.sha }}"

  build:
    name: build ${{ matrix.target }}
    needs: [prepare, create_release]
    if: needs.create_release.result == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: outl-macos-arm64
          # Cross-compile to Intel macOS from the ARM `macos-latest`
          # runner. We previously used `macos-13` here, but GitHub's
          # macos-13 runner pool got depleted and jobs sat queued for
          # ~14h before timing out. outl is pure Rust with no system
          # libs that need linking, so cross-compile works cleanly.
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: outl-macos-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: outl-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: outl-windows-x64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Install toolchain
        run: |
          rustup show
          rustup target add ${{ matrix.target }}

      - name: Patch workspace version to ${{ needs.prepare.outputs.version }}
        shell: bash
        # `cargo set-version` refuses pre-release "downgrades"
        # (0.1.0 -> 0.1.0-beta.42 is semver-less, even though we want
        # the binary to advertise the beta). Doing it with sed is both
        # simpler and bypasses that check. We rewrite every literal
        # `version = "<base>"` in the root manifest — that covers
        # `workspace.package.version` plus the path-dep version pins
        # in `workspace.dependencies`. Crate manifests use
        # `version.workspace = true` and don't need patching.
        run: |
          BASE='${{ needs.prepare.outputs.base }}'
          VERSION='${{ needs.prepare.outputs.version }}'
          sed -i.bak "s|version = \"${BASE}\"|version = \"${VERSION}\"|g" Cargo.toml
          rm Cargo.toml.bak
          grep -n "version" Cargo.toml | head -10

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin outl

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/outl dist/outl
          cp LICENSE README.md dist/
          tar -C dist -czf ${{ matrix.artifact }}.tar.gz outl LICENSE README.md
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/${{ matrix.target }}/release/outl.exe dist/outl.exe
          Copy-Item LICENSE, README.md dist/
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.artifact }}.zip
          $hash = (Get-FileHash ${{ matrix.artifact }}.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}.zip" | Out-File -Encoding ascii ${{ matrix.artifact }}.zip.sha256

      - name: Upload assets to draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        # `--clobber` lets us re-run a single matrix leg without
        # tripping over an already-uploaded asset from the previous
        # attempt. `nullglob` keeps the loop quiet when one platform
        # only produces .tar.gz and the other only .zip.
        run: |
          TAG='${{ needs.prepare.outputs.tag }}'
          shopt -s nullglob
          ASSETS=(
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.zip.sha256
          )
          STAGED=()
          for f in "${ASSETS[@]}"; do
            [[ -f "$f" ]] && STAGED+=("$f")
          done
          if [[ ${#STAGED[@]} -eq 0 ]]; then
            echo "::error::no assets staged for ${{ matrix.artifact }}"
            exit 1
          fi
          gh release upload "${TAG}" "${STAGED[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

  build_desktop:
    name: build desktop macOS (universal)
    needs: [prepare, create_release]
    if: needs.create_release.result == 'success'
    runs-on: macos-latest
    # Single universal dmg instead of a matrix split. Tauri 2's
    # `--target universal-apple-darwin` builds both aarch64 and
    # x86_64 binaries on the arm64 runner and `lipo`-merges them
    # into one .app that runs on both architectures. Benefits:
    #
    #   * One runner instead of two. `macos-13` (Intel) runner pool
    #     is consistently depleted — we previously had jobs queued
    #     for ~14h. Universal sidesteps that entirely.
    #   * One dmg, one sha, one cask URL. Cask file is much
    #     simpler (no `arch arm:`/`intel:` split), `update_tap` has
    #     one anchor to patch.
    #   * The dmg is ~2× bigger (carries both archs), which for
    #     outl-desktop's ~20MB binaries means ~40MB. Fine.
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Install Rust toolchain (arm64 + x86_64 targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Patch workspace version to ${{ needs.prepare.outputs.version }}
        shell: bash
        # Same sed pass as the CLI/TUI `build` job. We rewrite every
        # literal `version = "<base>"` in the root manifest. Crate
        # manifests use `version.workspace = true` and don't need
        # patching, including `crates/outl-desktop/src-tauri/Cargo.toml`.
        run: |
          BASE='${{ needs.prepare.outputs.base }}'
          VERSION='${{ needs.prepare.outputs.version }}'
          sed -i.bak "s|version = \"${BASE}\"|version = \"${VERSION}\"|g" Cargo.toml
          rm Cargo.toml.bak

      - name: Cache cargo (desktop universal)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-universal-apple-darwin-desktop-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Install frontend dependencies
        run: bun install

      - name: Build universal dmg
        # `--target universal-apple-darwin` triggers Tauri's universal
        # build path: compile arm64 + x86_64 → `lipo` merge → embed in
        # `outl.app` → package as dmg.
        #
        # `--bundles dmg` skips the .app-only export the macOS path
        # would otherwise also produce — we ship the dmg as the
        # cask source.
        working-directory: crates/outl-desktop
        run: bun run tauri build --target universal-apple-darwin --bundles dmg

      - name: Stage dmg + sha256
        shell: bash
        # Tauri's universal output name is
        # `<productName>_<version>_universal.dmg`. We rename to
        # `outl-desktop-macos.dmg` (no `-arm64`/`-x64` suffix —
        # there's only one dmg) so `update_tap` patches a single
        # anchor in the cask.
        #
        # The dmg is unsigned. Adding a Developer ID + notarytool
        # step lands when we register the Apple Developer account;
        # the cask carries a `caveats` block explaining the
        # `xattr -dr com.apple.quarantine` workaround in the meantime.
        run: |
          set -euo pipefail
          VERSION='${{ needs.prepare.outputs.version }}'
          SRC="target/universal-apple-darwin/release/bundle/dmg/outl_${VERSION}_universal.dmg"
          DST="outl-desktop-macos.dmg"
          if [[ ! -f "${SRC}" ]]; then
            echo "::error::expected universal dmg at ${SRC} (run produced:)"
            find target/universal-apple-darwin/release/bundle -name '*.dmg' -print
            exit 1
          fi
          cp "${SRC}" "${DST}"
          shasum -a 256 "${DST}" > "${DST}.sha256"

      - name: Upload dmg to draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG='${{ needs.prepare.outputs.tag }}'
          gh release upload "${TAG}" \
            "outl-desktop-macos.dmg" \
            "outl-desktop-macos.dmg.sha256" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

  publish_release:
    name: Publish release
    needs: [prepare, build, build_desktop]
    if: needs.build.result == 'success' && needs.build_desktop.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Flip draft to published
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG='${{ needs.prepare.outputs.tag }}'
          gh release edit "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft=false
          echo "::notice::Published ${TAG}"

  update_tap:
    name: Bump outl@beta formula + desktop cask
    needs: [prepare, publish_release]
    # Only beta releases for now. GA bumps `Formula/outl.rb` and the
    # GA cask by hand the first time; after that we can add a
    # similar job for GA.
    if: needs.publish_release.result == 'success' && needs.prepare.outputs.prerelease == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Bump Formula/outl@beta.rb + Casks/outl-desktop@beta.rb
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        # Patches two files in one pass so the published release
        # carries a matching formula and cask. The dmg sha files
        # share the `outl-desktop-<arch>.dmg.sha256` naming convention
        # used by the `build_desktop` job above.
        #
        # `git diff --quiet` early-outs when an asset went missing
        # (e.g. one matrix leg failed but `publish_release` still
        # flipped the draft). We log a notice rather than fail so
        # the rest of the workflow stays green.
        run: |
          set -euo pipefail
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern '*.sha256' --dir shas

          F=Formula/outl@beta.rb
          sed -i "s|^  version .*|  version \"$VERSION\"|" "$F"
          for arch in macos-arm64 macos-x64 linux-x64; do
            sha=$(awk '{print $1}' "shas/outl-${arch}.tar.gz.sha256")
            sed -i "s|sha256 \"[a-f0-9]*\" # anchor: ${arch}|sha256 \"${sha}\" # anchor: ${arch}|" "$F"
          done

          C=Casks/outl-desktop@beta.rb
          sed -i "s|^  version .*|  version \"$VERSION\"|" "$C"
          # Single universal dmg → one anchor (`# anchor: macos`).
          # Previously we patched separate arm64/x64 anchors; the
          # cask file collapsed when we moved to `--target
          # universal-apple-darwin`.
          sha=$(awk '{print $1}' "shas/outl-desktop-macos.dmg.sha256")
          sed -i "s|sha256 \"[a-f0-9]\{64\}\" # anchor: macos|sha256 \"${sha}\" # anchor: macos|" "$C"

          if git diff --quiet "$F" "$C"; then
            echo "::notice::No formula or cask changes for $TAG"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$F" "$C"
          # `[skip ci]` keeps this commit from re-triggering the release
          # workflow (which is `on: push: branches: [main]`).
          git commit -m "homebrew: outl ${VERSION} [skip ci]"
          git push origin HEAD:main
