name: Mobile

# Runs on every PR / push that touches the mobile crate or the
# shared crates the mobile app depends on. The iOS build is opt-in
# because it needs macOS and Xcode — push the button on the
# "Actions" tab when you want a fresh `.app`.

on:
  push:
    branches: [main]
    paths:
      - "crates/outl-mobile/**"
      - "crates/outl-actions/**"
      - "crates/outl-core/**"
      - "crates/outl-md/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/mobile.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/outl-mobile/**"
      - "crates/outl-actions/**"
      - "crates/outl-core/**"
      - "crates/outl-md/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/mobile.yml"
  workflow_dispatch:
    inputs:
      ios_build:
        description: "Run the iOS Simulator build job"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust-check:
    name: rust (fmt + clippy + test) — outl-mobile
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-mobile-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-mobile-
            ${{ runner.os }}-cargo-
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy (mobile + shared)
        run: |
          cargo clippy \
            -p outl-mobile -p outl-actions -p outl-core -p outl-md \
            --all-targets -- -D warnings
      - name: cargo test (mobile + shared)
        run: |
          cargo test \
            -p outl-mobile -p outl-actions -p outl-core -p outl-md \
            --all-targets

  frontend:
    name: frontend (vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/outl-mobile
    steps:
      - uses: actions/checkout@v4
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: bun install
        run: bun install --frozen-lockfile
      - name: vitest
        run: bun run test
      - name: bun run build
        run: bun run build

  ios-build:
    name: iOS Simulator build (opt-in)
    runs-on: macos-latest
    # Run when explicitly requested or on a PR labelled `ios-build`.
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.ios_build == 'true' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'ios-build'))
    needs: [rust-check, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcrun --sdk iphonesimulator --show-sdk-version
      - name: Install Rust toolchain + iOS targets
        run: |
          rustup show
          rustup target add aarch64-apple-ios-sim x86_64-apple-ios
      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ios-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ios-
            ${{ runner.os }}-cargo-
      - name: Install tauri-cli
        run: |
          if ! command -v cargo-tauri >/dev/null; then
            cargo install tauri-cli --version "^2.0" --locked
          fi
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: bun install
        working-directory: crates/outl-mobile
        run: bun install --frozen-lockfile
      - name: cargo tauri ios build (simulator, debug)
        working-directory: crates/outl-mobile
        run: cargo tauri ios build --target aarch64-sim --debug
      - name: Upload simulator .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: outl-ios-sim-debug
          path: crates/outl-mobile/src-tauri/gen/apple/build/arm64-sim/outl.app
          if-no-files-found: error
          retention-days: 7
